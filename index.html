<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- THEME -->
<link id="theme-style" rel="stylesheet" href="theme/default.css">

<title>Malirainvitation</title>

<style>
body{
  background:var(--bg);
  color:var(--text);
  font-family:sans-serif;
}

/* GLASS */
.glass{
  background:var(--card);
  backdrop-filter:blur(10px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.1);
}

/* BUTTON */
.btn{
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  padding:10px 20px;
  border-radius:10px;
  color:#fff;
}

/* CATEGORY */
.cat{
  padding:8px 14px;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  background:#2a1a10;
  color:#fff;
}
.cat.active{
  background:linear-gradient(135deg,var(--primary),var(--secondary));
}

/* SKELETON */
.skeleton{
  background:linear-gradient(90deg,#2a1a10,#3a2518,#2a1a10);
  background-size:200% 100%;
  animation:loading 1s infinite;
  border-radius:10px;
}
@keyframes loading{0%{background-position:200%}100%{-200%}}

.card:hover{transform:translateY(-5px);transition:.3s}
</style>
</head>

<body>

<!-- HEADER -->
<header class="glass p-4 flex justify-between items-center">
<b>Malirainvitation</b>

<div class="flex gap-2">
<button onclick="setTheme('default')" class="cat">Default</button>
<button onclick="setTheme('gold')" class="cat">Gold</button>
<button onclick="setTheme('dark')" class="cat">Dark</button>
</div>
</header>

<!-- HERO -->
<section class="text-center py-20">
<h1 class="text-4xl font-bold mb-4">Undangan Digital Premium</h1>
<p class="opacity-70 mb-6">Tema bisa ganti warna 🔥</p>
<a href="#tema" class="btn">Lihat Tema</a>
</section>

<!-- TEMA -->
<section id="tema" class="p-4 max-w-6xl mx-auto">

<input id="searchInput" class="w-full p-3 text-black rounded mb-4" placeholder="Cari tema...">

<div id="categories" class="flex gap-2 flex-wrap mb-4"></div>

<div id="themes" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

</section>

<!-- PAKET -->
<section id="paket" class="py-16 text-center max-w-6xl mx-auto">
<h2 class="text-3xl font-bold mb-3">Pilih Paket</h2>
<p class="opacity-70 mb-10">Sesuaikan kebutuhan kamu ✨</p>

<div class="grid md:grid-cols-3 gap-6">

<div class="glass p-6 card">
<h3>Basic</h3>
<p class="text-2xl">65K</p>
<ul class="text-sm mt-3">
<li>✔ RSVP</li>
<li>✔ Maps</li>
</ul>
<a href="#" class="btn block mt-4">Pesan</a>
</div>

<div class="glass p-6 card border-2 border-yellow-400">
<h3>Premium</h3>
<p class="text-2xl">75K</p>
<ul class="text-sm mt-3">
<li>✔ Galeri</li>
<li>✔ Musik</li>
</ul>
<a href="#" class="btn block mt-4">Pesan</a>
</div>

<div class="glass p-6 card">
<h3>Prioritas</h3>
<p class="text-2xl">100K</p>
<ul class="text-sm mt-3">
<li>✔ Full fitur</li>
<li>✔ Custom</li>
</ul>
<a href="#" class="btn block mt-4">Pesan</a>
</div>

</div>
</section>

<!-- FOOTER -->
<footer class="text-center py-10 border-t border-white/10">
<h3 class="mb-3">Malirainvitation</h3>

<div class="flex justify-center gap-4 mb-4">
<a href="#">📸</a>
<a href="#">💬</a>
<a href="#">🎵</a>
</div>

<p class="text-xs opacity-50">© 2026</p>
</footer>

<script>
/* ================= THEME SYSTEM ================= */
function setTheme(name){
  document.getElementById("theme-style").href = "theme/"+name+".css";
  localStorage.setItem("theme",name);
}

const urlParams=new URLSearchParams(window.location.search);
const urlTheme=urlParams.get("theme");

if(urlTheme){
  setTheme(urlTheme);
}else{
  const savedTheme=localStorage.getItem("theme")||"default";
  setTheme(savedTheme);
}

/* ================= DATA ================= */
const baseUrl="https://webinvit.id";
let allThemes=[];
let currentPage=1;
const perPage=8;

const categories=["Semua","Wedding","Aqiqah","Khitan","Birthday","Umum"];
let activeCategory="Semua";

/* CATEGORY */
categories.forEach(cat=>{
let btn=document.createElement("button");
btn.innerText=cat;
btn.className="cat";
if(cat==="Semua") btn.classList.add("active");

btn.onclick=()=>{
document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
activeCategory=cat;
currentPage=1;
applyFilter();
};

document.getElementById("categories").appendChild(btn);
});

/* CATEGORY LOGIC */
function getCategory(name){
let n=name.toLowerCase();
if(n.includes("aqiqah")) return "Aqiqah";
if(n.includes("khitan")) return "Khitan";
if(n.includes("wedding")) return "Wedding";
if(n.includes("birthday")) return "Birthday";
return "Umum";
}

/* SKELETON */
function showSkeleton(){
let el=document.getElementById("themes");
el.innerHTML="";
for(let i=0;i<8;i++){
el.innerHTML+=`<div class="glass p-2"><div class="skeleton h-32"></div></div>`;
}
}

/* LOAD */
async function loadThemes(){
showSkeleton();
let url=baseUrl+"/seller/api/v1/products/websites?limit=50";

while(url){
let res=await fetch(url);
let json=await res.json();
allThemes=allThemes.concat(json.data.data);
url=json.data.next_page_url;
}
applyFilter();
}

/* FILTER */
function applyFilter(){
let keyword=document.getElementById("searchInput").value.toLowerCase();

let filtered=allThemes.filter(t=>{
let name=t.name.toLowerCase();
let cat=getCategory(t.name);

return name.includes(keyword) && (activeCategory==="Semua"||cat===activeCategory);
});

render(filtered);
}

/* RENDER */
function render(data){
let el=document.getElementById("themes");
el.innerHTML="";

let start=(currentPage-1)*perPage;
let pageData=data.slice(start,start+perPage);

pageData.forEach(t=>{
el.innerHTML+=`
<div class="glass p-2 card">
<img src="${t.featured_image}" loading="lazy">
<p class="mt-2">${t.name}</p>
<a href="${baseUrl}/preview/${t.slug}" target="_blank" class="btn block mt-2 text-center">Preview</a>
</div>`;
});

pagination(data.length);
}

/* PAGINATION */
function pagination(total){
let totalPages=Math.ceil(total/perPage);
let html=`<div class="col-span-full flex gap-2 justify-center mt-6">`;

if(currentPage>1) html+=`<button onclick="goPage(${currentPage-1})" class="cat">Prev</button>`;

for(let i=1;i<=Math.min(10,totalPages);i++){
html+=`<button onclick="goPage(${i})" class="cat ${i===currentPage?'active':''}">${i}</button>`;
}

if(currentPage<totalPages) html+=`<button onclick="goPage(${currentPage+1})" class="cat">Next</button>`;

html+=`</div>`;

document.getElementById("themes").innerHTML+=html;
}

function goPage(i){
currentPage=i;
applyFilter();
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input",()=>{
currentPage=1;
applyFilter();
});

loadThemes();
</script>

</body>
</html>
